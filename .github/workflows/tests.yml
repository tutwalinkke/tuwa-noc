name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, mysql, sqlite3, pdo_sqlite, snmp
          coverage: none

      - name: Install and configure snmpd (for real SNMP protocol tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y snmpd snmp
          sudo tee /etc/snmp/snmpd.conf > /dev/null << 'SNMPEOF'
          agentAddress udp:127.0.0.1:161
          rocommunity public 127.0.0.1
          sysLocation CI Test Runner
          sysContact ci@tuwalink.com
          SNMPEOF
          sudo systemctl restart snmpd
          sleep 2
          snmpget -v2c -c public 127.0.0.1 1.3.6.1.2.1.1.1.0

      - name: Copy environment file
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate

      - name: Run test suite
        run: php artisan test
